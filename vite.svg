<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="lh"><rect x="0" y="0" width="16" height="32"/></clipPath>
    <clipPath id="rh"><rect x="16" y="0" width="16" height="32"/></clipPath>
  </defs>
  <!-- Blue left half -->
  <circle cx="16" cy="16" r="15" fill="#3b82f6" clip-path="url(#lh)"/>
  <!-- Red right half -->
  <circle cx="16" cy="16" r="15" fill="#ef4444" clip-path="url(#rh)"/>
  <!-- Divider line -->
  <line x1="16" y1="2" x2="16" y2="30" stroke="white" stroke-width="1.5"/>
  <!-- Euro sign -->
  <text x="16" y="17" text-anchor="middle" font-size="13" font-weight="bold"
        fill="white" font-family="sans-serif">€</text>
  <!-- Delta (diff) -->
  <text x="16" y="27" text-anchor="middle" font-size="9" font-weight="bold"
        fill="white" font-family="sans-serif">Δ</text>
</svg>
